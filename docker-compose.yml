version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres-db:
    image: postgres
    container_name: members_db_container
    platform: linux/amd64
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: members_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d members_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. NestJS Backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: members_backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=adminpassword
      - DATABASE=members_db
    depends_on:
      postgres-db:
        condition: service_healthy

  # 3. Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: members_frontend
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
